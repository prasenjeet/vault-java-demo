# HashiCorp Vault Java Demo — Wiki

A production-grade Java demonstration of all four major HashiCorp Vault secret engines.

## Pages

| Page | Description |
|------|-------------|
| [Architecture](#architecture) | Component diagram, data flows, design decisions |
| [Getting Started](#getting-started) | Prerequisites, infrastructure setup, running the demo |
| [Database](db) | Dynamic PostgreSQL credentials, lease management, HikariCP integration |
| [PKI](pki) | X.509 certificate issuance, CA hierarchy, CSR signing, revocation |
| [Transit](transit) | Encryption-as-a-Service, signing, HMAC, key rotation, envelope encryption |
| [SSH](ssh) | OTP authentication, signed SSH certificates, host certificates |
| [Authentication](auth) | Token auth (dev), AppRole auth (production), policy configuration |
| [Monitoring](monitoring) | Prometheus metrics, Grafana dashboard, MetricsService instrumentation |
| [Configuration](config) | All environment variables, defaults, and Vault paths |
| [Java API Reference](api) | Method signatures and usage for all service classes |
| [Testing](testing) | Integration tests with Testcontainers, test structure |

## Quick Start

```bash
# 1. Start Vault + PostgreSQL + Prometheus + Grafana
docker compose up -d

# 2. Configure all secret engines
export VAULT_ADDR=http://127.0.0.1:8201
export VAULT_TOKEN=root
bash scripts/setup-all.sh

# 3. Run the demo
mvn exec:java -Dexec.mainClass=com.example.vault.VaultDemoApplication

# 4. Run a specific engine
mvn exec:java -Dexec.mainClass=com.example.vault.VaultDemoApplication -Dexec.args=transit

# 5. View metrics
# Raw:      http://localhost:8080/metrics
# Prometheus: http://localhost:9090
# Grafana:  http://localhost:3000  (admin / admin)
```

## Secret Engines at a Glance

```
┌──────────────────────────────────────────────────────────────────┐
│            Secret Engine Coverage                                │
│                                                                  │
│  ① Dynamic DB Secrets  — Auto-rotating PostgreSQL credentials   │
│  ② PKI                 — On-demand X.509 TLS certificates       │
│  ③ Transit             — Encryption / Signing / HMAC / Key Mgmt │
│  ④ SSH                 — OTP login + Signed certificate access   │
└──────────────────────────────────────────────────────────────────┘
```

# Architecture

## Component Overview

```
┌─────────────────────────────────────────────────────────────────────┐
│                      vault-java-demo                                │
│                                                                     │
│  VaultDemoApplication                                               │
│        │                                                            │
│        ├─── MetricsService (singleton)                              │
│        │       └── Prometheus HTTP server (:8080/metrics)           │
│        │                                                            │
│        ├─── VaultConfig (singleton)                                 │
│        │       └── VaultTemplate (Spring Vault)                     │
│        │                                                            │
│        ├─── DynamicDatabaseSecretService   ──► Vault database/      │
│        │       └── HikariCP DataSource     ──► PostgreSQL           │
│        │                                                            │
│        ├─── PkiSecretService               ──► Vault pki_int/       │
│        │       └── BouncyCastle (cert parsing)                      │
│        │                                                            │
│        ├─── TransitSecretService           ──► Vault transit/       │
│        │       └── VaultTransitOperations                           │
│        │                                                            │
│        └─── SshSecretService               ──► Vault ssh/           │
│                                                 ssh-client-signer/  │
│                                                 ssh-host-signer/    │
└─────────────────────────────────────────────────────────────────────┘
```

## Runtime Infrastructure (docker-compose.yml)

```
┌──────────────────────┐     ┌──────────────────────┐
│  HashiCorp Vault     │     │  PostgreSQL           │
│  Port: 8201          │     │  Port: 5432           │
│  Dev mode (unsealed) │     │  DB: mydb             │
│  Root token: root    │     │  User: postgres       │
└──────────────────────┘     └──────────────────────┘

┌──────────────────────┐     ┌──────────────────────┐
│  Prometheus          │     │  Grafana              │
│  Port: 9090          │────►│  Port: 3000           │
│  Scrapes :8080/metrics│    │  admin / admin        │
└──────────────────────┘     │  Vault Demo dashboard │
                             └──────────────────────┘
```

## Package Structure

```
com.example.vault/
├── VaultDemoApplication.java      Main entry point; CLI arg routing; starts MetricsService
├── config/
│   ├── VaultConfig.java           Singleton; token auth; VaultTemplate factory
│   └── AppRoleVaultConfig.java    Production AppRole authentication
├── db/
│   └── DynamicDatabaseSecretService.java
├── pki/
│   └── PkiSecretService.java
├── transit/
│   └── TransitSecretService.java
├── ssh/
│   └── SshSecretService.java
├── metrics/
│   └── MetricsService.java        Singleton; Prometheus registry + embedded HTTP server
└── model/
    ├── DatabaseCredential.java    Record: username, password, leaseId, ttl, role
    └── IssuedCertificate.java     Record: certPem, keyPem, caPem, leaseId, ttl
```

## Key Design Decisions

### VaultTemplate as the central client
All secret engines use `VaultTemplate` from Spring Vault (`spring-vault-core`). This is used standalone — no Spring Boot required. Configured once in `VaultConfig` and shared across services.

### Singleton VaultConfig
`VaultConfig` is a thread-safe singleton (`getInstance()`). `getVaultTemplate()` is lazily initialized and synchronized. This avoids creating multiple HTTP connection pools for the same Vault connection.

### Records for domain types
`DatabaseCredential` and `IssuedCertificate` are Java 17 records. They are immutable value objects — credentials from Vault are never mutated after creation.

### Demo mode / graceful degradation
`VaultDemoApplication.main()` catches connectivity failures and continues in demo mode. Each engine's `runDemo()` method catches its own exceptions and prints informative setup hints.

### SecretLeaseContainer for auto-renewal
`DynamicDatabaseSecretService.setupAutoRenewal()` uses Spring Vault's `SecretLeaseContainer` with `RequestedSecret.rotating()`. When the lease is renewed, a new `HikariCP` pool is created atomically via `AtomicReference<HikariDataSource>`, and the old pool is closed. This achieves zero-downtime credential rotation.

### Private keys never leave Vault (Transit)
All Transit operations send plaintext to Vault and receive ciphertext back. The private signing keys (ECDSA P-256, RSA-4096) are stored in Vault and are never returned to the application.

### MetricsService singleton
`MetricsService` mirrors the `VaultConfig` singleton pattern. All Prometheus metrics are static fields registered at class-load time. The embedded HTTP server starts once in `main()`, and its non-daemon thread keeps the JVM alive after all demos complete so Prometheus can scrape final values. Each service calls the static helpers `startTimer()`, `recordSuccess()`, and `recordError()` around every Vault operation.

## Data Flow Examples

### Dynamic DB Credential Lifecycle
```
App boots
  └► VaultConfig.getVaultTemplate()
  └► DynamicDatabaseSecretService.getDynamicCredentials("readonly")
       └► GET /v1/database/creds/readonly
       ◄── { username, password, lease_id, lease_duration: 3600s }
  └► buildDataSource(cred)              → HikariCP pool
  └► executeQuery()                     → PostgreSQL
  └► revokeLease(cred) [on shutdown]
       └► POST /v1/sys/leases/revoke
       └── PostgreSQL: DROP ROLE "v-token-readonly-xyz"
```

### Transit Encrypt/Decrypt
```
encrypt("app-encryption", "sensitive data")
  └► POST /v1/transit/encrypt/app-encryption
       body: { plaintext: base64("sensitive data") }
  ◄── { ciphertext: "vault:v3:AAAA..." }

decrypt("app-encryption", "vault:v3:AAAA...")
  └► POST /v1/transit/decrypt/app-encryption
       body: { ciphertext: "vault:v3:AAAA..." }
  ◄── { plaintext: base64("sensitive data") }
```

### PKI Certificate Issuance
```
issueCertificate("api.internal.example.com", 72h, SANs, IPs)
  └► POST /v1/pki_int/issue/example-dot-com
       body: { common_name, ttl, alt_names, ip_sans }
  ◄── { certificate: PEM, private_key: PEM, issuing_ca: PEM }
```

# Getting Started

## Prerequisites

| Tool | Version | Purpose |
|------|---------|---------|
| Java | 17+ | Runtime (JDK required) |
| Maven | 3.8+ | Build and dependency management |
| Docker | 20+ | Vault + PostgreSQL containers |
| `vault` CLI | 1.15+ | Setup scripts |
| `jq` | any | Used in `setup-all.sh` for JSON parsing |

Set `JAVA_HOME` if needed:

```bash
export JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk-17.jdk/Contents/Home
```

## Step 1 — Start Infrastructure

```bash
# Start all services: Vault, PostgreSQL, Prometheus, Grafana
docker compose up -d

# Optional: also start PgAdmin (DB browser UI on port 5050)
docker compose --profile tools up -d

# Confirm containers are running
docker ps

# Verify Vault health
curl http://localhost:8201/v1/sys/health
# Expected: {"initialized":true,"sealed":false,...}
```

| Service    | Port | Details |
|------------|------|---------|
| Vault      | 8201 | Dev mode, root token `root` |
| PostgreSQL | 5432 | DB `mydb`, user `postgres` / `postgres` |
| Prometheus | 9090 | Scrapes Java app on `host.docker.internal:8080` |
| Grafana    | 3000 | admin / admin — Vault Demo dashboard pre-provisioned |
| PgAdmin    | 5050 | admin@admin.com / admin — only with `--profile tools` |

## Step 2 — Configure Vault Secret Engines

```bash
export VAULT_ADDR=http://127.0.0.1:8201
export VAULT_TOKEN=root

bash scripts/setup-all.sh
```

The setup script configures, in order:

1. **Database engine** — PostgreSQL connection + `readonly` and `readwrite` roles
2. **PKI engine** — Root CA → Intermediate CA → certificate issuance role
3. **Transit engine** — AES-256, ECDSA, RSA-4096, and HMAC keys
4. **SSH engine** — OTP role, client-signer CA, host-signer CA
5. **Vault policy** — `myapp-policy` covering all paths
6. **AppRole auth** — `myapp` role bound to the policy

On success, the script prints:

```
VAULT_ROLE_ID=<role-id>
VAULT_SECRET_ID=<secret-id>
```

Save these for AppRole authentication.

## Step 3 — Run the Demo

```bash
# All four engines
mvn exec:java -Dexec.mainClass=com.example.vault.VaultDemoApplication

# Specific engine
mvn exec:java -Dexec.mainClass=com.example.vault.VaultDemoApplication -Dexec.args=transit
mvn exec:java -Dexec.mainClass=com.example.vault.VaultDemoApplication -Dexec.args=db
mvn exec:java -Dexec.mainClass=com.example.vault.VaultDemoApplication -Dexec.args=pki
mvn exec:java -Dexec.mainClass=com.example.vault.VaultDemoApplication -Dexec.args=ssh
```

Environment variables (defaults work against `docker compose up`):

```bash
export VAULT_ADDR=http://127.0.0.1:8201
export VAULT_TOKEN=root
export DB_HOST=localhost
export DB_PORT=5432
export DB_NAME=mydb
```

## Step 4 — View Metrics

Once the Java app is running, open:

- **Raw metrics**: http://localhost:8080/metrics
- **Prometheus UI**: http://localhost:9090 — query `vault_operations_total`
- **Grafana**: http://localhost:3000 — open the pre-built **Vault Demo** dashboard (admin / admin)

The app keeps the metrics server alive after all demos finish. Press **Ctrl+C** to exit.

## Step 5 — Run Integration Tests

```bash
# Testcontainers spins up real Vault and PostgreSQL automatically
mvn test
```

Tests are in `src/test/java/com/example/vault/VaultIntegrationTest.java`. Docker must be running.

## Build Fat JAR

```bash
mvn package -DskipTests
java -jar target/vault-java-demo-1.0.0.jar [db|pki|transit|ssh|all]
```

## Verifying Individual Engines via CLI

After running `setup-all.sh`, you can test each engine independently:

```bash
# Database — fetch dynamic credentials
vault read database/creds/readonly

# PKI — issue a certificate
vault write pki_int/issue/example-dot-com common_name=api.internal.example.com ttl=1h

# Transit — encrypt/decrypt
vault write transit/encrypt/app-encryption plaintext=$(echo -n "hello" | base64)
vault write transit/decrypt/app-encryption ciphertext=<ciphertext from above>

# SSH — generate OTP
vault write ssh/creds/otp-role ip=10.0.0.1 username=ubuntu

# SSH — sign a public key
vault write ssh-client-signer/sign/my-role public_key=@~/.ssh/id_rsa.pub
```

## Troubleshooting

**`Vault is sealed`** — Restart the Vault container: `docker compose restart vault`

**`No credentials returned from Vault`** — Setup script did not run or failed. Re-run `bash scripts/setup-all.sh`.

**`PostgreSQL connection refused`** — Container not ready yet. Wait ~5s after `docker compose up -d`.

**`VAULT_ROLE_ID and VAULT_SECRET_ID must be set`** — You instantiated `AppRoleVaultConfig` without those env vars. Use `VaultConfig` (token auth) for local dev.

**`Could not start metrics server on port 8080`** — Port 8080 is in use. Set `METRICS_PORT=9091` and update `monitoring/prometheus/prometheus.yml` to match.

**Grafana shows "No data"** — Prometheus hasn't scraped yet (15s delay) or the Java app isn't running. Confirm `http://localhost:8080/metrics` is reachable from the host.
</script>

<script type="text/markdown" id="md-db">
# Secret Engine: Dynamic Database Secrets

**Class**: `com.example.vault.db.DynamicDatabaseSecretService`

## What It Does

Vault generates short-lived PostgreSQL credentials on demand. No static passwords are stored anywhere. Each credential set has a TTL; when it expires, Vault automatically drops the database role.

## How It Works

```
App → vault read database/creds/readonly
    ← { username: "v-token-readonly-abc123",
        password: "A1b2-C3d4-E5f6-G7h8",
        lease_id: "database/creds/readonly/abcdef...",
        lease_duration: 3600 }
App → PostgreSQL (connect with dynamic creds)
TTL expires → Vault executes: DROP ROLE "v-token-readonly-abc123"
```

## Vault Configuration

```bash
vault secrets enable database

vault write database/config/mypostgres \
    plugin_name=postgresql-database-plugin \
    allowed_roles="readonly,readwrite,admin" \
    connection_url="postgresql://{{username}}:{{password}}@postgres:5432/mydb?sslmode=disable" \
    username="postgres" \
    password="postgres"
```

**Roles:**

| Role | Permissions | default_ttl | max_ttl |
|------|-------------|-------------|---------|
| `readonly` | SELECT on all tables + sequences | 1h | 24h |
| `readwrite` | SELECT, INSERT, UPDATE, DELETE | 1h | 24h |

## Java API

### Fetch credentials once

```java
DynamicDatabaseSecretService service = new DynamicDatabaseSecretService(
    vaultTemplate, "localhost", "5432", "mydb");

DatabaseCredential cred = service.getDynamicCredentials("readonly");
// cred.username()             → "v-token-readonly-abc123"
// cred.password()             → "A1b2-C3d4-..."
// cred.leaseId()              → "database/creds/readonly/..."
// cred.leaseDurationSeconds() → 3600
// cred.role()                 → "readonly"
```

### Build a HikariCP connection pool

```java
HikariDataSource ds = service.buildDataSource(cred);

try (Connection conn = ds.getConnection()) {
    // Use the connection normally
}
```

Pool settings applied automatically:
- `maximumPoolSize=5`, `minimumIdle=1`
- `maxLifetime` set to `(leaseDuration - 60) seconds` to prevent stale connections
- `connectionTestQuery=SELECT 1`

### Auto-renewal with SecretLeaseContainer

```java
AtomicReference<HikariDataSource> dsHolder = new AtomicReference<>();
service.setupAutoRenewal("readonly", dsHolder);

// SecretLeaseContainer runs in background.
// On renewal → new DataSource created, old one closed atomically.
try (Connection conn = dsHolder.get().getConnection()) { ... }
```

Uses `RequestedSecret.rotating()` — Spring Vault tracks the lease and renews it before expiry.

### Revoke a lease explicitly

```java
service.revokeLease(cred);
// Calls POST /v1/sys/leases/revoke
// Vault drops the DB user immediately
```

## DatabaseCredential Record

```java
public record DatabaseCredential(
    String username,
    String password,
    String leaseId,
    long   leaseDurationSeconds,
    String role
) {
    public boolean isNearExpiry(long thresholdSeconds, long issuedAtEpochSeconds)
}
```

`toString()` never includes the password.

## Vault Paths

| Operation | HTTP | Vault Path |
|-----------|------|------------|
| Fetch credentials | `GET` | `database/creds/{role}` |
| Revoke lease | `POST` | `sys/leases/revoke` |
| Renew lease | `POST` | `sys/leases/renew` |

## Policy Requirements

```hcl
path "database/creds/readonly"  { capabilities = ["read"] }
path "database/creds/readwrite" { capabilities = ["read"] }
path "sys/leases/renew"         { capabilities = ["create", "update"] }
path "sys/leases/revoke"        { capabilities = ["create", "update"] }
```

## Username Format

Vault-generated usernames follow: `v-{auth_method}-{role}-{random}`

- Token auth (dev): `v-token-readonly-abc123xyz`
- AppRole auth: `v-approle-readonly-abc123xyz`

The database user is dropped when the lease expires or `revokeLease()` is called.
</script>

<script type="text/markdown" id="md-pki">
# Secret Engine: PKI (Certificate Authority)

**Class**: `com.example.vault.pki.PkiSecretService`

## What It Does

Vault acts as an internal Certificate Authority. It issues X.509 TLS certificates on demand with configurable TTLs. No manual CSR/signing workflow — the application requests a cert and uses it.

## CA Hierarchy

```
Root CA (mount: pki/)
    └── Intermediate CA (mount: pki_int/)
            └── Issues certs for *.example.com
                             *.internal.example.com
                             *.test.example.com
```

The intermediate CA is what applications interact with. The root CA's private key is used only to sign the intermediate CA certificate.

## Vault Configuration

```bash
# Root CA
vault secrets enable pki
vault secrets tune -max-lease-ttl=87600h pki
vault write pki/root/generate/internal common_name="example.com Root CA" ttl=87600h

# Intermediate CA
vault secrets enable -path=pki_int pki
vault secrets tune -max-lease-ttl=43800h pki_int

# Issuance role
vault write pki_int/roles/example-dot-com \
    allowed_domains="example.com,internal.example.com,test.example.com" \
    allow_subdomains=true \
    allow_bare_domains=true \
    max_ttl=720h \
    key_type=rsa \
    key_bits=2048 \
    server_flag=true \
    client_flag=true
```

## Java API

### Construct the service

```java
PkiSecretService pki = new PkiSecretService(
    vaultTemplate,
    "pki_int",         // mount path of the intermediate CA
    "example-dot-com"  // role name
);
```

### Issue a certificate

```java
IssuedCertificate cert = pki.issueCertificate(
    "api.internal.example.com",
    Duration.ofHours(72),
    new String[]{"api.example.com", "localhost"},  // DNS SANs
    new String[]{"127.0.0.1", "10.0.0.5"}         // IP SANs
);

cert.commonName()           // "api.internal.example.com"
cert.certificatePem()       // "-----BEGIN CERTIFICATE-----..."
cert.privateKeyPem()        // "-----BEGIN RSA PRIVATE KEY-----..."
cert.issuingCaPem()         // "-----BEGIN CERTIFICATE-----..."
cert.leaseDurationSeconds() // 259200 (72h)
```

### Sign an externally-generated CSR

```java
String csrPem = Files.readString(Path.of("/path/to/request.csr"));

String signedCertPem = pki.signCsr(
    csrPem,
    "service.internal.example.com",
    Duration.ofHours(24)
);
```

Use this when the private key must never leave the requesting system.

### Revoke a certificate

```java
pki.revokeCertificate("1a:2b:3c:4d:5e:6f");
// Certificate appears in CRL at next rotation
```

### Save certificate to files

```java
pki.saveCertificateToFiles(cert, Path.of("/etc/app/tls"));
// Writes:
//   /etc/app/tls/tls.crt  — certificate
//   /etc/app/tls/tls.key  — private key (chmod 600)
//   /etc/app/tls/ca.crt   — issuing CA cert
//   /etc/app/tls/chain.pem — full CA chain (if present)
```

### Parse and inspect a certificate

```java
X509Certificate x509 = pki.parseCertificate(cert.certificatePem());

x509.getSubjectX500Principal()  // CN=api.internal.example.com
x509.getIssuerX500Principal()   // CN=example.com Intermediate CA
x509.getNotBefore()             // issue time
x509.getNotAfter()              // expiry time
x509.getSerialNumber()          // BigInteger serial
```

Uses BouncyCastle (`bcpkix-jdk18on`) for PEM parsing, with a JDK `CertificateFactory` fallback.

## IssuedCertificate Record

```java
public record IssuedCertificate(
    String commonName,
    String certificatePem,    // tls.crt
    String privateKeyPem,     // tls.key — SENSITIVE
    String issuingCaPem,      // ca.crt
    String caChainPem,        // chain.pem
    String leaseId,
    long   leaseDurationSeconds
)
// toString() → summary() — never exposes private key
```

## Vault Paths

| Operation | HTTP | Vault Path |
|-----------|------|------------|
| Issue certificate | `POST` | `pki_int/issue/example-dot-com` |
| Sign CSR | `POST` | `pki_int/sign/example-dot-com` |
| Revoke certificate | `POST` | `pki_int/revoke` |
| Get CRL | `GET` | `pki_int/crl` (unauthenticated) |

## Policy Requirements

```hcl
path "pki_int/issue/example-dot-com" { capabilities = ["create", "update"] }
path "pki_int/sign/example-dot-com"  { capabilities = ["create", "update"] }
path "pki_int/revoke"                { capabilities = ["create", "update"] }
```

## Certificate Rotation Strategy

Short-lived certs (≤72h) make revocation less critical — let them expire. For longer TTLs, use `revokeCertificate()` and rely on CRL or OCSP.

- **Microservices**: issue 24h–72h certs at startup, restart to rotate
- **CI/CD pipelines**: issue 1h cert per job, let it expire
- **Long-running services**: background thread calls `issueCertificate()` ~1h before expiry
</script>

<script type="text/markdown" id="md-transit">
# Secret Engine: Transit (Encryption-as-a-Service)

**Class**: `com.example.vault.transit.TransitSecretService`

## What It Does

Vault handles all cryptographic operations. The application sends plaintext to Vault and receives ciphertext back. Private keys **never leave Vault**. Ciphertext carries a version tag (`v3`) so old ciphertexts remain decryptable after key rotation.

## Keys Configured

| Constant | Key Name | Algorithm | Use Case |
|----------|----------|-----------|----------|
| `ENCRYPTION_KEY` | `app-encryption` | AES-256-GCM96 | Symmetric encrypt/decrypt |
| `SIGNING_KEY` | `app-signing` | ECDSA P-256 | Digital signatures |
| `RSA_KEY` | `app-rsa` | RSA-4096 | RSA signing |
| `HMAC_KEY` | `app-hmac` | HMAC-SHA256 | Message authentication |

## Vault Configuration

```bash
vault secrets enable transit

vault write -f transit/keys/app-encryption           # AES-256-GCM
vault write transit/keys/app-signing type=ecdsa-p256
vault write transit/keys/app-rsa     type=rsa-4096
vault write -f transit/keys/app-hmac

vault write transit/keys/app-encryption/config \
    min_decryption_version=1 \
    min_encryption_version=0 \
    deletion_allowed=false
```

## Java API

### Encrypt / Decrypt

```java
TransitSecretService transit = new TransitSecretService(vaultTemplate);

String ciphertext = transit.encrypt("app-encryption", "4111-1111-1111-1111");
// → "vault:v1:8SDd3WHDOjf7mq69CkisfDy6ec2..."

String plaintext = transit.decrypt("app-encryption", ciphertext);
// → "4111-1111-1111-1111"
```

### Context-bound encryption

```java
// Ciphertext is bound to the context — cannot decrypt without the same context
String ct = transit.encryptWithContext("app-encryption", "secret", "tenant-id-42");
String pt = transit.decryptWithContext("app-encryption", ct, "tenant-id-42");
```

### Batch encrypt / decrypt

```java
List<String> records = List.of("SSN:123-45-6789", "SSN:987-65-4321", "SSN:555-12-3456");

List<String> ciphertexts = transit.batchEncrypt("app-encryption", records);
// Single API call to Vault regardless of list size

List<String> plaintexts = transit.batchDecrypt("app-encryption", ciphertexts);
```

### Sign / Verify

```java
String payload   = "{\"userId\":\"u-1234\",\"action\":\"transfer\",\"amount\":5000}";
String signature = transit.sign("app-signing", payload);
// → "vault:v1:MEQCIHKr..."

boolean valid = transit.verify("app-signing", payload, signature);
// → true
```

### HMAC

```java
String hmacValue = transit.hmac("app-hmac", "message body");
boolean ok       = transit.verifyHmac("app-hmac", "message body", hmacValue);
```

### Key rotation

```java
transit.rotateKey("app-encryption");
// New encryptions use the latest version
// Old ciphertexts (v1, v2...) still decrypt normally
```

### Rewrap ciphertext

```java
// Re-encrypt an old ciphertext with the latest key version — no plaintext exposed
String newCt = transit.rewrap("app-encryption", oldCiphertext);
// "vault:v1:..." → "vault:v3:..."
```

### Envelope encryption (data keys)

```java
Map<String, String> dek = transit.generateDataKey("app-encryption", 256);

String plaintextKey  = dek.get("plaintext");   // base64 AES-256 key — use then discard
String ciphertextKey = dek.get("ciphertext");  // vault:v1:... — store in DB

// Pattern:
// 1. Generate DEK from Vault
// 2. Encrypt large data locally with plaintextKey (AES)
// 3. Store ciphertextKey alongside encrypted data
// 4. Discard plaintextKey from memory
// 5. Later: decrypt ciphertextKey via Vault → use to decrypt data
```

### Hash and random bytes

```java
// Supported: sha2-256, sha2-512, sha3-256, sha3-512
String hexHash    = transit.hash("my data", "sha2-256");

// CSPRNG random bytes from Vault
String base64Rand = transit.generateRandomBytes(32);
```

## Ciphertext Format

```
vault:v{version}:{base64-encoded-ciphertext}

vault:v1:8SDd3WHDOjf7mq69Ck...    ← encrypted with key version 1
vault:v3:KSDd3WHDOjf7mq69Ck...    ← encrypted with key version 3 (after 2 rotations)
```

## Vault Paths

| Operation | HTTP | Vault Path |
|-----------|------|------------|
| Encrypt | `POST` | `transit/encrypt/{key}` |
| Decrypt | `POST` | `transit/decrypt/{key}` |
| Sign | `POST` | `transit/sign/{key}` |
| Verify | `POST` | `transit/verify/{key}` |
| HMAC | `POST` | `transit/hmac/{key}` |
| Rotate key | `POST` | `transit/keys/{key}/rotate` |
| Rewrap | `POST` | `transit/rewrap/{key}` |
| Data key | `POST` | `transit/datakey/plaintext/{key}` |
| Hash | `POST` | `transit/hash/{algorithm}` |
| Random bytes | `POST` | `transit/random/{n}` |

## Policy Requirements

```hcl
path "transit/encrypt/app-encryption"           { capabilities = ["create", "update"] }
path "transit/decrypt/app-encryption"           { capabilities = ["create", "update"] }
path "transit/sign/app-signing"                 { capabilities = ["create", "update"] }
path "transit/verify/app-signing"               { capabilities = ["create", "update"] }
path "transit/rewrap/app-encryption"            { capabilities = ["create", "update"] }
path "transit/hmac/app-hmac"                    { capabilities = ["create", "update"] }
path "transit/datakey/plaintext/app-encryption" { capabilities = ["create", "update"] }
```
</script>

<script type="text/markdown" id="md-ssh">
# Secret Engine: SSH

**Class**: `com.example.vault.ssh.SshSecretService`

## Two Modes

| Mode | How It Works | Server Requirement |
|------|-------------|-------------------|
| **OTP** | Single-use password per host+user | `vault-ssh-helper` on server |
| **Signed Certs** | Vault signs user's SSH public key with TTL | Install CA public key in `sshd_config` |

## Vault Configuration

Three separate SSH mounts:

```bash
# OTP mode
vault secrets enable ssh
vault write ssh/roles/otp-role \
    key_type=otp default_user=ubuntu \
    allowed_users="ubuntu,ec2-user,centos,admin" \
    cidr_list="0.0.0.0/0"

# Client certificate signing
vault secrets enable -path=ssh-client-signer ssh
vault write ssh-client-signer/config/ca generate_signing_key=true
vault write ssh-client-signer/roles/my-role \
    key_type=ca allow_user_certificates=true \
    allowed_users="ubuntu,ec2-user,*" ttl=30m0s max_ttl=8h

# Host certificate signing
vault secrets enable -path=ssh-host-signer ssh
vault write ssh-host-signer/config/ca generate_signing_key=true
vault write ssh-host-signer/roles/host-role \
    key_type=ca allow_host_certificates=true \
    allowed_domains="*.example.com" ttl=87600h
```

## Java API

```java
SshSecretService ssh = new SshSecretService(vaultTemplate);
// default mounts: ssh, ssh-client-signer, ssh-host-signer

// Custom mounts:
SshSecretService ssh = new SshSecretService(
    "ssh", "ssh-client-signer", "ssh-host-signer", vaultTemplate);
```

## Mode 1: OTP

### Generate an OTP

```java
SshOtpCredential otp = ssh.generateOtp("otp-role", "ubuntu", "10.0.1.100");

otp.otp()                  // one-time password (masked in logs)
otp.keyType()              // "otp"
otp.username()             // "ubuntu"
otp.targetIp()             // "10.0.1.100"
otp.leaseDurationSeconds() // TTL in seconds
```

```bash
ssh -o PasswordAuthentication=yes ubuntu@10.0.1.100
# Enter the OTP when prompted — consumed on first use
```

### Verify an OTP (server-side)

```java
boolean valid = ssh.verifyOtp(otp.otp(), "ubuntu", "10.0.1.100");
// This is what vault-ssh-helper does on the SSH server
```

## Mode 2: Signed Certificates

### Sign a user's public key

```java
Map<String, String> extensions = Map.of(
    "permit-pty", "",
    "permit-port-forwarding", "",
    "permit-agent-forwarding", ""
);

String publicKey = Files.readString(Path.of(System.getProperty("user.home") + "/.ssh/id_rsa.pub"));

SshSignedCertificate cert = ssh.signUserPublicKey(
    "my-role",
    publicKey,
    "ubuntu,ec2-user",      // valid principals (OS usernames)
    Duration.ofMinutes(30),
    extensions
);

cert.signedKeyContent()   // "ssh-rsa-cert-v01@openssh.com ..."
cert.serialNumber()       // certificate serial number
cert.validPrincipals()    // "ubuntu,ec2-user"
cert.ttl()                // Duration.ofMinutes(30)
```

### Save the certificate

```java
ssh.saveCertificate(
    cert,
    Path.of(System.getProperty("user.home") + "/.ssh"),
    "id_rsa"    // cert saved as id_rsa-cert.pub with chmod 600
);
```

```bash
ssh ubuntu@10.0.1.100
# Uses id_rsa + id_rsa-cert.pub automatically
# No password; cert proves identity; expires in 30 minutes
```

### Sign a server's host key

```java
SshSignedCertificate hostCert = ssh.signHostPublicKey(
    "host-role",
    Files.readString(Path.of("/etc/ssh/ssh_host_rsa_key.pub")),
    "server1.example.com,server1",
    Duration.ofHours(87600)    // host certs are long-lived
);
```

### Get the CA public key

```java
String caPubKey = ssh.getCaPublicKey("ssh-client-signer");
// Install on each SSH server:
// echo caPubKey >> /etc/ssh/trusted-user-ca-keys.pem
// sshd_config: TrustedUserCAKeys /etc/ssh/trusted-user-ca-keys.pem
```

## Inner Record Types

```java
record SshOtpCredential(
    String otp, String keyType, String username,
    String targetIp, String port, String leaseId,
    long leaseDurationSeconds
) {}

record SshSignedCertificate(
    String signedKeyContent, String serialNumber,
    String validPrincipals, Duration ttl, String leaseId
) {}
```

## OTP vs Signed Certificates

| | OTP | Signed Certificates |
|-|-----|---------------------|
| Server requirement | `vault-ssh-helper` on every server | CA public key in `sshd_config` |
| Client requirement | None (standard password auth) | Standard SSH key pair |
| Traceability | Full audit log in Vault | Serial number in Vault audit log |
| Revocation | Not needed (single use) | Let short-TTL certs expire |
| Recommended for | Legacy servers | New infrastructure |

## Vault Paths

| Operation | HTTP | Vault Path |
|-----------|------|------------|
| Generate OTP | `POST` | `ssh/creds/{role}` |
| Verify OTP | `POST` | `ssh/verify` |
| Sign user public key | `POST` | `ssh-client-signer/sign/{role}` |
| Sign host public key | `POST` | `ssh-host-signer/sign/{role}` |
| Get client CA key | `GET` | `ssh-client-signer/config/ca` |
</script>

<script type="text/markdown" id="md-auth">
# Authentication

## Two Methods

| Method | Class | When to Use |
|--------|-------|-------------|
| Token | `VaultConfig` | Local dev, CI jobs with short-lived tokens |
| AppRole | `AppRoleVaultConfig` | Production applications |

## Token Authentication (Dev/Test)

**Class**: `com.example.vault.config.VaultConfig`

```bash
export VAULT_ADDR=http://127.0.0.1:8201
export VAULT_TOKEN=root
```

```java
VaultConfig config = VaultConfig.getInstance();

// Optional: verify Vault is reachable and unsealed
config.verifyConnectivity();   // throws RuntimeException if sealed or unreachable

VaultTemplate vaultTemplate = config.getVaultTemplate();
```

`VaultConfig` is a thread-safe singleton. `getVaultTemplate()` is lazily initialized and synchronized. `verifyConnectivity()` calls `GET /v1/sys/health` and throws if Vault is sealed.

**Defaults** (when env vars are not set):
- `VAULT_ADDR` → `http://127.0.0.1:8200`
- `VAULT_TOKEN` → `root`

> The `docker-compose.yml` exposes Vault on port **8201**. Set `VAULT_ADDR=http://127.0.0.1:8201`.

## AppRole Authentication (Production)

**Class**: `com.example.vault.config.AppRoleVaultConfig`

AppRole separates credentials into two parts:
- **Role ID** — not a secret, baked into the container image or config map
- **Secret ID** — secret, injected at runtime from CI/CD or init container

```bash
export VAULT_ADDR=https://vault.production.example.com
export VAULT_ROLE_ID=<role-id-from-vault>
export VAULT_SECRET_ID=<secret-id-injected-at-runtime>
export VAULT_APPROLE_PATH=approle   # optional, default is "approle"
```

```java
AppRoleVaultConfig appRoleConfig = new AppRoleVaultConfig();
VaultTemplate vaultTemplate = appRoleConfig.buildVaultTemplate();
// Calls auth/approle/login immediately and exchanges credentials for a Vault token
```

Throws `IllegalStateException` if `VAULT_ROLE_ID` or `VAULT_SECRET_ID` is missing.

## Setting Up AppRole in Vault

The setup script creates an AppRole named `myapp`:

```bash
vault auth enable approle

vault write auth/approle/role/myapp \
    token_ttl=1h \
    token_max_ttl=4h \
    token_policies="myapp-policy" \
    bind_secret_id=true \
    secret_id_ttl=24h \
    secret_id_num_uses=100

# Get Role ID (not a secret — embed in config)
vault read -field=role_id auth/approle/role/myapp/role-id

# Generate Secret ID (inject at runtime)
vault write -field=secret_id -f auth/approle/role/myapp/secret-id
```

## Environment Variable Reference

| Variable | Used By | Default | Description |
|----------|---------|---------|-------------|
| `VAULT_ADDR` | Both | `http://127.0.0.1:8200` | Vault server URL |
| `VAULT_TOKEN` | `VaultConfig` | `root` | Auth token |
| `VAULT_ROLE_ID` | `AppRoleVaultConfig` | — | AppRole Role ID (required) |
| `VAULT_SECRET_ID` | `AppRoleVaultConfig` | — | AppRole Secret ID (required) |
| `VAULT_APPROLE_PATH` | `AppRoleVaultConfig` | `approle` | AppRole mount path |
</script>

<script type="text/markdown" id="md-monitoring">
# Monitoring — Prometheus & Grafana

The demo ships a full observability stack. No extra configuration is needed beyond `docker compose up -d`.

## Stack Overview

```
Java App  (:8080/metrics)
    │  Prometheus scrapes every 15s
    ▼
Prometheus (:9090)
    │  Grafana queries via datasource
    ▼
Grafana (:3000)
    │  pre-provisioned "Vault Demo" dashboard
```

## Service URLs

| Service    | URL                           | Credentials   |
|------------|-------------------------------|---------------|
| Metrics    | http://localhost:8080/metrics | —             |
| Prometheus | http://localhost:9090         | —             |
| Grafana    | http://localhost:3000         | admin / admin |

Grafana auto-provisions the Prometheus datasource and **Vault Demo** dashboard on first start — no manual setup required.

## Exposed Prometheus Metrics

| Metric | Type | Labels | Description |
|--------|------|--------|-------------|
| `vault_operations_total` | Counter | `engine`, `operation`, `status` | All Vault API calls, tagged success/error |
| `vault_operation_duration_seconds` | Histogram | `engine`, `operation` | Latency per operation (11 buckets, 1ms–5s) |
| `vault_transit_key_rotations_total` | Counter | `key` | Transit key rotation count |
| `vault_db_credential_ttl_seconds` | Gauge | `role` | TTL of most recently issued DB credential |
| `vault_pki_cert_ttl_seconds` | Gauge | `role` | TTL of most recently issued PKI certificate |
| `vault_ssh_cert_ttl_seconds` | Gauge | `principals` | TTL of most recently signed SSH certificate |
| `jvm_*` | Various | — | JVM heap, GC, threads, classloading (auto) |

## PromQL Examples

```promql
# Error rate by engine
rate(vault_operations_total{status="error"}[5m])

# p95 latency for PKI cert issuance
histogram_quantile(0.95,
  rate(vault_operation_duration_seconds_bucket{engine="pki"}[5m]))

# Transit encrypt success rate
rate(vault_operations_total{engine="transit",operation="encrypt",status="success"}[1m])
```

## Instrumenting Operations

```java
Histogram.Timer timer = MetricsService.startTimer("transit", "encrypt");
try {
    String result = doVaultCall();
    MetricsService.recordSuccess("transit", "encrypt");
    return result;
} catch (Exception e) {
    MetricsService.recordError("transit", "encrypt");
    throw e;
} finally {
    timer.observeDuration();
}
```

## Changing the Metrics Port

```bash
export METRICS_PORT=9091
mvn exec:java -Dexec.mainClass=com.example.vault.VaultDemoApplication
```

Update `monitoring/prometheus/prometheus.yml` scrape target to match.

## Troubleshooting

**`Could not start metrics server on port 8080`** — Port in use. Set `METRICS_PORT` to a free port.

**Prometheus shows `DOWN` for `vault-java-demo`** — Java app not running, or port mismatch with `prometheus.yml`.

**Grafana "No data"** — Up to 15s scrape delay, or no Vault operations run yet.

<script type="text/markdown" id="md-api">
# Java API Reference

## MetricsService

Thread-safe singleton. Registers all Prometheus metrics at class-load and starts an embedded HTTP server on `METRICS_PORT` (default `8080`).

```java
// Get singleton (reads METRICS_PORT env var)
MetricsService metrics = MetricsService.getInstance();

// Start /metrics HTTP server (non-daemon — keeps JVM alive after main())
metrics.startServer();

int port = metrics.getPort();   // default: 8080

// ── Static instrumentation helpers ─────────────────────────────────────

// Start a latency timer
Histogram.Timer timer = MetricsService.startTimer(String engine, String operation);
// ... call Vault ...
timer.observeDuration();   // always in finally block

// Record outcome
MetricsService.recordSuccess(String engine, String operation);
MetricsService.recordError(String engine, String operation);

// ── Pre-registered static metrics ──────────────────────────────────────
Counter   MetricsService.VAULT_OPERATIONS            // labels: engine, operation, status
Histogram MetricsService.VAULT_OPERATION_DURATION    // labels: engine, operation
Counter   MetricsService.TRANSIT_KEY_ROTATIONS       // labels: key
Gauge     MetricsService.DB_CREDENTIAL_TTL           // labels: role
Gauge     MetricsService.PKI_CERT_TTL                // labels: role
Gauge     MetricsService.SSH_CERT_TTL                // labels: principals
```

Typical usage pattern:

```java
Histogram.Timer timer = MetricsService.startTimer("transit", "encrypt");
try {
    String result = transitOps.encrypt(keyName, plaintext);
    MetricsService.recordSuccess("transit", "encrypt");
    return result;
} catch (Exception e) {
    MetricsService.recordError("transit", "encrypt");
    throw e;
} finally {
    timer.observeDuration();
}
```

---

## VaultConfig

```java
// Singleton access
VaultConfig config = VaultConfig.getInstance();

// Health check (throws RuntimeException if sealed or unreachable)
config.verifyConnectivity();

// Get the shared VaultTemplate
VaultTemplate vaultTemplate = config.getVaultTemplate();

// Accessors
String addr  = config.getVaultAddr();   // e.g. "http://127.0.0.1:8201"
String token = config.getVaultToken();  // e.g. "root"
```

## AppRoleVaultConfig

Requires `VAULT_ROLE_ID` and `VAULT_SECRET_ID` environment variables.

```java
AppRoleVaultConfig config = new AppRoleVaultConfig();
VaultTemplate vaultTemplate = config.buildVaultTemplate();

// Print Vault CLI setup instructions to stdout
AppRoleVaultConfig.printSetupInstructions();
```

## DynamicDatabaseSecretService

```java
DynamicDatabaseSecretService service = new DynamicDatabaseSecretService(
    vaultTemplate, "localhost", "5432", "mydb");

// Fetch credentials
DatabaseCredential cred = service.getDynamicCredentials(String role);

// Build HikariCP pool
HikariDataSource ds = service.buildDataSource(DatabaseCredential cred);

// Background auto-renewal — swaps DataSource atomically
service.setupAutoRenewal(String role, AtomicReference<HikariDataSource> dsHolder);

// Explicit revocation (drops DB user immediately)
service.revokeLease(DatabaseCredential cred);

// End-to-end demo
service.runDemo(String role);
```

## DatabaseCredential

```java
record DatabaseCredential(
    String username,
    String password,
    String leaseId,
    long   leaseDurationSeconds,
    String role
)

boolean nearExpiry = cred.isNearExpiry(thresholdSeconds, issuedAtEpochSeconds);
```

## PkiSecretService

```java
PkiSecretService pki = new PkiSecretService(
    vaultTemplate, "pki_int", "example-dot-com");

IssuedCertificate cert = pki.issueCertificate(
    String commonName, Duration ttl,
    String[] altNames,   // DNS SANs (nullable)
    String[] ipSans      // IP SANs (nullable)
);

String signedCertPem = pki.signCsr(String csrPem, String commonName, Duration ttl);

pki.revokeCertificate(String serialNumber);   // colon-separated hex

pki.saveCertificateToFiles(IssuedCertificate cert, Path directory) throws IOException;

X509Certificate x509 = pki.parseCertificate(String pemCert) throws Exception;

pki.runDemo();
```

## IssuedCertificate

```java
record IssuedCertificate(
    String commonName,
    String certificatePem,       // tls.crt
    String privateKeyPem,        // tls.key — SENSITIVE
    String issuingCaPem,         // ca.crt
    String caChainPem,           // chain.pem
    String leaseId,
    long   leaseDurationSeconds
)
// toString() → summary() — never exposes private key
```

## TransitSecretService

```java
TransitSecretService transit = new TransitSecretService(vaultTemplate);

// Key name constants
TransitSecretService.ENCRYPTION_KEY  // "app-encryption"
TransitSecretService.SIGNING_KEY     // "app-signing"
TransitSecretService.RSA_KEY         // "app-rsa"
TransitSecretService.HMAC_KEY        // "app-hmac"

// Encrypt / Decrypt
String ciphertext = transit.encrypt(String keyName, String plaintext);
String plaintext  = transit.decrypt(String keyName, String ciphertext);

// Context-bound
String ct = transit.encryptWithContext(String keyName, String plaintext, String context);
String pt = transit.decryptWithContext(String keyName, String ciphertext, String context);

// Batch (single API call)
List<String> ciphertexts = transit.batchEncrypt(String keyName, List<String> plaintexts);
List<String> plaintexts  = transit.batchDecrypt(String keyName, List<String> ciphertexts);

// Sign / Verify
String  signature = transit.sign(String keyName, String data);
boolean valid     = transit.verify(String keyName, String data, String signature);

// HMAC
String  hmacValue = transit.hmac(String keyName, String data);
boolean ok        = transit.verifyHmac(String keyName, String data, String hmacValue);

// Key management
transit.rotateKey(String keyName);
String newCt = transit.rewrap(String keyName, String ciphertext);

// Envelope encryption
// Returns: {"plaintext": base64, "ciphertext": "vault:v{n}:..."}
Map<String, String> dek = transit.generateDataKey(String keyName, int bits);

// Crypto utilities
String hexHash    = transit.hash(String data, String algorithm);
String base64Rand = transit.generateRandomBytes(int numBytes);

transit.runDemo();
```

## SshSecretService

```java
SshSecretService ssh = new SshSecretService(vaultTemplate);

// Custom mount paths
SshSecretService ssh = new SshSecretService(
    String otpMountPath, String clientSignerMountPath,
    String hostSignerMountPath, vaultTemplate);

// OTP
SshOtpCredential otp = ssh.generateOtp(String roleName, String username, String targetIp);
boolean valid         = ssh.verifyOtp(String otp, String username, String ip);

// Signed client certificate
SshSignedCertificate cert = ssh.signUserPublicKey(
    String roleName, String sshPublicKeyPem,
    String validPrincipals,         // "ubuntu,ec2-user"
    Duration ttl,
    Map<String, String> extensions  // {"permit-pty": ""}
);

// Signed host certificate
SshSignedCertificate hostCert = ssh.signHostPublicKey(
    String roleName, String hostPublicKey,
    String hostnames,               // "server1.example.com,server1"
    Duration ttl
);

// CA public key (install on SSH servers as TrustedUserCAKeys)
String caPubKey = ssh.getCaPublicKey(String mountPath);

// Save cert to ~/.ssh/{keyBasename}-cert.pub with chmod 600
ssh.saveCertificate(SshSignedCertificate cert, Path sshDir, String keyBasename) throws IOException;

ssh.runDemo();
```

### SshSecretService Inner Records

```java
record SshOtpCredential(
    String otp, String keyType, String username,
    String targetIp, String port, String leaseId,
    long leaseDurationSeconds
) {}

record SshSignedCertificate(
    String signedKeyContent,    // write to ~/.ssh/id_rsa-cert.pub
    String serialNumber,
    String validPrincipals,
    Duration ttl,
    String leaseId
) {}
```

<script type="text/markdown" id="md-testing">
# Testing

## Overview

Integration tests use **Testcontainers** to spin up a real HashiCorp Vault Docker container. No mocking — every test hits an actual Vault instance. Docker must be running.

```bash
mvn test
```

**Test file**: `src/test/java/com/example/vault/VaultIntegrationTest.java`

## Test Setup

A static `VaultContainer` is annotated with `@Container`, managed by `@Testcontainers`. Testcontainers handles the full lifecycle.

```java
static final VaultContainer<?> vault = new VaultContainer<>("hashicorp/vault:latest")
    .withVaultToken(ROOT_TOKEN)
    .withEnv("SKIP_SETCAP", "true")
    .withEnv("VAULT_LOCAL_CONFIG", "{\"disable_mlock\":true,\"ui\":false}")
    .withInitCommand(
        "secrets enable database",
        "secrets enable pki",
        "secrets enable transit",
        "secrets enable ssh",
        "secrets enable -path=ssh-client-signer ssh",
        "write -f transit/keys/app-encryption",
        "write transit/keys/app-signing type=ecdsa-p256",
        // ... more setup
    );
```

`SKIP_SETCAP=true` and `disable_mlock=true` allow the container to run without `CAP_IPC_LOCK`.

`@BeforeAll` wires the container URL into `VaultConfig`:

```java
System.setProperty("VAULT_ADDR", "http://" + vault.getHost() + ":" + vault.getFirstMappedPort());
System.setProperty("VAULT_TOKEN", ROOT_TOKEN);
vaultTemplate = VaultConfig.getInstance().getVaultTemplate();
```

## Transit Tests

| Test | What It Verifies |
|------|-----------------|
| `testEncryptDecrypt` | Roundtrip: encrypt → decrypt equals original |
| `testEncryptProducesDifferentCiphertexts` | Distinct plaintexts → distinct ciphertexts |
| `testBatchEncryptDecrypt` | Single API call encrypts and decrypts 4 items correctly |
| `testSignVerify` | ECDSA signature verifies against original payload |
| `testTamperedPayloadFailsVerification` | Modified payload does NOT verify |
| `testKeyRotationBackwardCompatibility` | Old ciphertext still decrypts after key rotation |
| `testRewrap` | Rewrapped ciphertext decrypts to same plaintext as original |
| `testContextBoundEncryption` | Different contexts produce different ciphertexts |

## PKI Tests

| Test | What It Verifies |
|------|-----------------|
| `testIssueCertificate` | PEM fields non-null, correct CN, PEM headers present |
| `testParseCertificate` | X509Certificate subject matches CN, not expired |
| `testUniqueCertificates` | Two issuances produce different cert + key PEMs |

> Uses the `pki/` mount (Root CA directly) with role `test-role`. The demo application uses `pki_int/`.

## SSH Tests

| Test | What It Verifies |
|------|-----------------|
| `testSignUserPublicKey` | Signed cert is non-null and is an SSH certificate |
| `testGetCaPublicKey` | CA pub key contains `ssh-rsa` or `ecdsa` |

> OTP tests are not included — OTP mode requires `vault-ssh-helper` running on the target host.

## What Is Not Tested

- **Database engine** — Requires a live PostgreSQL with a `CREATE ROLE`-capable user. Testcontainers PostgreSQL module is in the POM and available to add.
- **SSH OTP verification** — Server-side; requires `vault-ssh-helper` on the target.
- **AppRole auth** — Production auth path; not exercised in tests.
- **Lease auto-renewal** — `setupAutoRenewal()` requires a background thread and real DB.

## Running Specific Tests

```bash
# Transit tests only
mvn test -Dtest="VaultIntegrationTest\$TransitTests"

# PKI tests only
mvn test -Dtest="VaultIntegrationTest\$PkiTests"

# SSH tests only
mvn test -Dtest="VaultIntegrationTest\$SshTests"

# Connectivity check only
mvn test -Dtest="VaultIntegrationTest#testVaultConnectivity"
```

## Test Dependencies

| Library | Purpose |
|---------|---------|
| `testcontainers:vault` | Manages `hashicorp/vault` Docker container |
| `testcontainers:junit-jupiter` | `@Testcontainers` and `@Container` annotations |
| `testcontainers:postgresql` | Available for future DB integration tests |
| `junit-jupiter` | Test framework |
| `mockito-core` | Available for unit test mocking |

    el.innerHTML = marked.parse(src);

  // ── Tab switching ───────────────────────────────────────────────────────────
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    const page = document.getElementById('page-' + id);
    if (page) {
      page.classList.add('active');
      page.closest('.content').scrollTop = 0;
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      if (btn.getAttribute('onclick') === `showPage('${id}')`) {
        btn.classList.add('active');
      }
    });

    // Update URL hash
    history.replaceState(null, '', '#' + id);
  }

  // ── Search / filter nav ─────────────────────────────────────────────────────
  function filterNav(query) {
    const q = query.toLowerCase().trim();
    const sections = { general: true, engines: true, ref: true };

    document.querySelectorAll('.nav-btn').forEach(btn => {
      const label = btn.dataset.label.toLowerCase();
      btn.style.display = (!q || label.includes(q)) ? '' : 'none';
    });

    // Hide section headers if all buttons in section are hidden
    const btns = [...document.querySelectorAll('.nav-btn')];
    const groups = {
      general: btns.slice(0, 3),
      engines: btns.slice(3, 7),
      ref:     btns.slice(7),   // auth, monitoring, config, api, testing
    };
    Object.entries(groups).forEach(([key, group]) => {
      const header = document.getElementById('nav-group-' + key);
      const anyVisible = group.some(b => b.style.display !== 'none');
      header.style.display = anyVisible ? '' : 'none';
    });
  }

  // ── Deep link via hash ──────────────────────────────────────────────────────
  const hash = window.location.hash.replace('#', '');
  if (hash && document.getElementById('page-' + hash)) {
    showPage(hash);
  }
