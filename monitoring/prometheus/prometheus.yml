global:
  scrape_interval:     5s
  evaluation_interval: 5s

scrape_configs:

  # Vault Java demo application metrics
  - job_name: 'vault-java-demo'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'vault-java-demo'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
