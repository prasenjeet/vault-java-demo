version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# HashiCorp Vault Java Demo — Local Development Stack
#
# Usage:
#   docker compose up -d
#   bash scripts/setup-all.sh
#   mvn exec:java
#
# Services:
#   vault      → http://localhost:8201  (token: root)
#   postgres   → localhost:5432
#   prometheus → http://localhost:9090
#   grafana    → http://localhost:3000  (admin / admin)
#   pgadmin    → http://localhost:5050  (admin@admin.com / admin)  [--profile tools]
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── HashiCorp Vault (Dev Mode) ─────────────────────────────────────────────
  #
  # CAP_SETFCAP fix:
  #   Newer Vault images try to set file capabilities via setcap, which fails
  #   in rootless Docker, WSL2, CI/CD runners, and restricted cloud VMs.
  #
  #   Fix 1 — SKIP_SETCAP=true      : skips the setcap call entirely
  #   Fix 2 — disable_mlock=true    : disables memory locking (safe for dev)
  #            so IPC_LOCK capability is not needed at all
  #   Fix 3 — cap_add: IPC_LOCK     : REMOVED (caused the CAP_SETFCAP error)
  #
  vault:
    image: hashicorp/vault:latest
    container_name: vault-dev
    # ── DO NOT add cap_add: IPC_LOCK — triggers CAP_SETFCAP error ──────────
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:   root
      VAULT_DEV_LISTEN_ADDRESS:  0.0.0.0:8201
      VAULT_LOG_LEVEL:           info
      # Skips the setcap binary call that causes CAP_SETFCAP permission error
      SKIP_SETCAP:               "true"
      # Inline HCL config — disables mlock so IPC_LOCK cap is not required
      VAULT_LOCAL_CONFIG: |
        {
          "disable_mlock": true,
          "ui": true
        }
    ports:
      - "8201:8201"
    # Give vault user permission to write its data directory
    user: "100:1000"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s
    networks:
      - vault-net

  # ── PostgreSQL (for Dynamic DB Secrets) ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vault-postgres
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vault-net

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: vault-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      # Allows Prometheus (inside Docker) to reach the Java app on the host
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vault-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: vault-grafana
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vault-net

  # ── PgAdmin (optional — DB browser UI) ────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vault-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vault-net
    profiles:
      - tools    # Only started with: docker compose --profile tools up

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  vault-net:
    driver: bridge
